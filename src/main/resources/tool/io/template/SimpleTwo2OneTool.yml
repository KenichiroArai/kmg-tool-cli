# シンプル2入力ファイルから1出力ファイルへの変換ツールのテンプレートファイル
#
# このテンプレートファイルは、入力ファイルの各行に対して適用されます。
# { name } プレースホルダーが入力ファイルの各行の内容に置換されます。

# テンプレートの内容
# { name }のプレースホルダーが実際の値に置換される
templateContent: |
    /**
     * { name }の処理
     *
     * @since 0.1.0
     */
    public void process{ name }() {
        // { name }の処理ロジック
    }
